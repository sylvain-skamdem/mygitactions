name: Job outputs and dependencies

on:
  push:
    branches:
      - "hotfix/**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  generate-info:
    runs-on: ubuntu-latest
    outputs:
      current_date: ${{ steps.generate.outputs.current_date }}
      commit_sha: ${{ steps.generate.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Purpose
        run: echo "Generating repo info..."
      - name: Set outputs for date and commit SHA
        id: generate
        run: |
            CURRENT_DATE=$(date +%c)
            # LATEST_COMMIT_ID=$( git re-parse --short=6 HEAD)
            LATEST_COMMIT_SHA=${GITHUB_SHA::6}
            echo "Built at $CURRENT_DATE"
            echo "Build commit ref -> $LATEST_COMMIT_SHA"
            echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
            echo "commit_sha=$LATEST_COMMIT_SHA" >> $GITHUB_OUTPUT
            printenv

  consume-info:
    needs: generate-info
    runs-on: ubuntu-latest
    steps:
      - name: Print received Output
        run: |
            echo "======================================="
            echo "Received output of current date which is: ${{ needs.generate-info.outputs.current_date }}"
            echo "+++++++++++++++++++++++++++++++++++++++"
            echo "Also received output of latest commit SHA which is: ${{ needs.generate-info.outputs.commit_sha }}"
            echo "======================================="

  final-report:
    needs: consume-info
    runs-on: ubuntu-latest
    steps:
      - name: Display final report
        run: echo "Workflow completed successfully on ${{ needs.consume-info.outputs.current_date }} using commit ${{ needs.consume-info.outputs.commit_sha }}"
